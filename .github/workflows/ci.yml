name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ci:
    name: CI チェック
    runs-on: ubuntu-latest

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js 22.x をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: 依存関係をインストール
        run: npm ci

      - name: TypeScript 型チェック
        run: npx tsc --noEmit

      - name: ESLint 静的解析
        run: npm run lint

      - name: テスト実行（カバレッジ 100% 検証）
        run: npm run test:coverage

      - name: プロダクションビルド
        run: npm run build
